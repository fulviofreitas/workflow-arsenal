# ============================================================================
# 🔄 Renovate — Self-Renovation
# ============================================================================
# Keeps this repository's own action version references up to date.
# Uses the renovate composite action from this repo.
# ============================================================================

name: 🔄 Renovate

on:
  schedule:
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  renovate:
    name: 🔄 Renovate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🔄 Run Renovate
        uses: fulviofreitas/workflow-arsenal/.github/actions/renovate@4d0d414972635cc9fbcd137d0b2837c6f5ccf9e0 # master
        with:
          app-id: ${{ secrets.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
