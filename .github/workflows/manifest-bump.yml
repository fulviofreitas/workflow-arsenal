# =============================================================================
# manifest-bump (reusable)
# =============================================================================
# Opens (or updates) a PR in a downstream GitOps repo that pins a new container
# image tag in a Kubernetes manifest. Generalized from
# fulviofreitas/HolyClaude — used by any app whose image is built in-repo and
# deployed via fulviofreitas/ff-k8s (or another GitOps repo).
#
# Caller example:
#   jobs:
#     bump:
#       uses: fulviofreitas/workflow-arsenal/.github/workflows/manifest-bump.yml@master
#       with:
#         downstream-repo: fulviofreitas/ff-k8s
#         manifest-path: k8s-homelab/kubernetes/apps/holyclaude/deployment.yaml
#         image-name: ghcr.io/fulviofreitas/holyclaude
#         image-tag: 1.2.2-fork.3
#         pr-title: "chore(holyclaude): bump image to 1.2.2-fork.3"
#         pr-labels: autoupdate,holyclaude
#       secrets:
#         downstream-token: ${{ secrets.FF_K8S_PR_TOKEN }}
# =============================================================================

name: manifest-bump

on:
  workflow_call:
    inputs:
      downstream-repo:
        description: "owner/repo of the GitOps repo to PR against"
        required: true
        type: string
      downstream-branch:
        description: "Branch to base PR on"
        required: false
        type: string
        default: master
      manifest-path:
        description: "Path to the manifest file to mutate"
        required: true
        type: string
      image-name:
        description: "Image name (without tag) to pin"
        required: true
        type: string
      image-tag:
        description: "Tag to pin"
        required: true
        type: string
      pr-title:
        description: "Pull request title"
        required: true
        type: string
      pr-body:
        description: "Pull request body (markdown)"
        required: false
        type: string
        default: ""
      pr-labels:
        description: "Comma-separated list of labels to apply"
        required: false
        type: string
        default: "autoupdate"
      pr-assignees:
        description: "Comma-separated list of assignees"
        required: false
        type: string
        default: ""
      branch-prefix:
        description: "Branch name prefix"
        required: false
        type: string
        default: "bump"
    secrets:
      downstream-token:
        description: "PAT with contents:write + pull-requests:write on downstream-repo"
        required: true

jobs:
  bump:
    name: Bump manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout downstream
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.downstream-repo }}
          token: ${{ secrets.downstream-token }}
          ref: ${{ inputs.downstream-branch }}
          path: downstream
          fetch-depth: 1

      - name: Update image reference
        working-directory: downstream
        env:
          NEW_REF: ${{ inputs.image-name }}:${{ inputs.image-tag }}
          IMAGE_NAME: ${{ inputs.image-name }}
          MANIFEST: ${{ inputs.manifest-path }}
        run: |
          set -euo pipefail
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::manifest not found: $MANIFEST"; exit 1
          fi
          # Replace any tag for the same image-name. Tolerates registry prefix
          # variations (e.g. switching from docker.io/foo/bar to ghcr.io/foo/bar
          # on a previous bump), as long as the basename matches.
          basename="$(basename "$IMAGE_NAME")"
          # First pass: exact image-name match.
          escaped_image=$(printf '%s' "$IMAGE_NAME" | sed 's|[/.]|\\&|g')
          sed -i -E "s|image:\s*${escaped_image}:[^[:space:]]+|image: ${NEW_REF}|g" "$MANIFEST"
          # Second pass: any registry, same basename — only if the first pass
          # didn't touch anything.
          if ! grep -qF "$NEW_REF" "$MANIFEST"; then
            sed -i -E "s|image:\s*[^[:space:]]*/${basename}:[^[:space:]]+|image: ${NEW_REF}|g" "$MANIFEST"
          fi
          echo "----- after -----"
          grep -n "image:" "$MANIFEST" || true

      - name: Open / update PR
        working-directory: downstream
        env:
          GH_TOKEN: ${{ secrets.downstream-token }}
          BRANCH: ${{ inputs.branch-prefix }}/${{ inputs.image-tag }}
          TITLE: ${{ inputs.pr-title }}
          LABELS: ${{ inputs.pr-labels }}
          ASSIGNEES: ${{ inputs.pr-assignees }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No change in manifest — already pinned."; exit 0
          fi

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "$TITLE"
          git push --force-with-lease origin "$BRANCH"

          # Compose body: caller-provided body + footer.
          body_file=$(mktemp)
          {
            if [ -n "${{ inputs.pr-body }}" ]; then
              cat <<'BODY_EOF'
          ${{ inputs.pr-body }}
          BODY_EOF
              echo
            fi
            echo "<sub>Generated by \`fulviofreitas/workflow-arsenal/.github/workflows/manifest-bump.yml\`.</sub>"
          } > "$body_file"

          existing=$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number' || echo "")
          create_args=(--base "${{ inputs.downstream-branch }}" --head "$BRANCH" --title "$TITLE" --body-file "$body_file")
          IFS=',' read -ra label_arr <<< "$LABELS"
          for l in "${label_arr[@]}"; do [ -n "$l" ] && create_args+=(--label "$l"); done
          if [ -n "$ASSIGNEES" ]; then
            IFS=',' read -ra assignee_arr <<< "$ASSIGNEES"
            for a in "${assignee_arr[@]}"; do [ -n "$a" ] && create_args+=(--assignee "$a"); done
          fi

          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "$TITLE" --body-file "$body_file"
          else
            gh pr create "${create_args[@]}"
          fi
