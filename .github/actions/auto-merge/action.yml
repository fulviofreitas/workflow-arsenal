# ============================================================================
# 🤖 Auto-Merge Action
# ============================================================================
# Reusable composite action for automatically merging approved PRs.
# Uses pascalgn/automerge-action for reliable auto-merge functionality.
#
# Authentication options (choose one):
#   1. GitHub App (recommended for merging workflow files)
#   2. GitHub token (default, cannot merge workflow files)
#
# Usage with GitHub App:
#   - uses: fulviofreitas/workflow-arsenal/.github/actions/auto-merge@master
#     with:
#       app-id: ${{ secrets.RENOVATE_APP_ID }}
#       app-private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
#
# Usage with token:
#   - uses: fulviofreitas/workflow-arsenal/.github/actions/auto-merge@master
#     with:
#       github-token: ${{ secrets.GITHUB_TOKEN }}
# ============================================================================

name: "🤖 Auto-Merge"
description: "Automatically merge approved PRs with required labels"

inputs:
  github-token:
    description: "GitHub token for merging (use app-id/app-private-key instead for workflow files)"
    required: false
    default: ""
  app-id:
    description: "GitHub App ID for authentication (recommended for merging PRs with workflow changes)"
    required: false
    default: ""
  app-private-key:
    description: "GitHub App private key"
    required: false
    default: ""
  merge-labels:
    description: "Labels that trigger merge (comma-separated)"
    required: false
    default: "automerge"
  blocking-labels:
    description: "Labels that block merge (comma-separated)"
    required: false
    default: "wip,do-not-merge"
  merge-method:
    description: "Merge method (merge, squash, rebase)"
    required: false
    default: "squash"
  delete-branch:
    description: "Delete branch after merge"
    required: false
    default: "true"
  required-approvals:
    description: "Number of required approvals"
    required: false
    default: "1"
  review-label:
    description: "Label that requires approval before merge. PRs without this label merge with 0 required approvals."
    required: false
    default: "needs-review"
  update-method:
    description: "Method to keep PR up to date with base"
    required: false
    default: "merge"
  fix-dependabot-prefix:
    description: "Rewrite Dependabot PR titles from chore(deps) to fix(deps) so security bumps trigger semantic-release"
    required: false
    default: "true"

outputs:
  merged:
    description: "Whether the PR was merged"
    value: ${{ steps.automerge.outputs.mergeResult == 'merged' }}
  result:
    description: "Merge result status"
    value: ${{ steps.automerge.outputs.mergeResult }}
  pr-number:
    description: "PR number that was processed"
    value: ${{ steps.automerge.outputs.pullRequestNumber }}
  token:
    description: "Generated GitHub App token (if app-id was provided)"
    value: ${{ steps.app-token.outputs.token }}

runs:
  using: "composite"
  steps:
    # ========================================================================
    # 🔑 Authentication
    # ========================================================================
    - name: 🔑 Generate GitHub App token
      id: app-token
      if: inputs.app-id != '' && inputs.app-private-key != ''
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - name: 🔐 Resolve authentication token
      id: auth
      shell: bash
      run: |
        if [[ -n "${{ steps.app-token.outputs.token }}" ]]; then
          echo "token=${{ steps.app-token.outputs.token }}" >> $GITHUB_OUTPUT
          echo "🔑 Using GitHub App token"
        elif [[ -n "${{ inputs.github-token }}" ]]; then
          echo "token=${{ inputs.github-token }}" >> $GITHUB_OUTPUT
          echo "🔑 Using provided GitHub token"
        else
          echo "::error::No authentication provided. Set either app-id/app-private-key or github-token."
          exit 1
        fi

    # ========================================================================
    # 🤖 Auto-Merge
    # ========================================================================
    - name: 🏷️ Format labels and resolve approvals
      id: format-labels
      shell: bash
      env:
        GH_TOKEN: ${{ steps.auth.outputs.token }}
      run: |
        # Transform "wip,do-not-merge" into "!wip,!do-not-merge"
        BLOCKING="${{ inputs.blocking-labels }}"
        if [[ -n "$BLOCKING" ]]; then
          FORMATTED=$(echo "$BLOCKING" | sed 's/,/,!/g' | sed 's/^/!/')
        else
          FORMATTED=""
        fi
        echo "blocking-labels=$FORMATTED" >> $GITHUB_OUTPUT

        # Resolve required approvals based on review-label presence
        REVIEW_LABEL="${{ inputs.review-label }}"
        REQUIRED_APPROVALS="${{ inputs.required-approvals }}"

        if [[ -n "$REVIEW_LABEL" && "${{ github.event_name }}" == "pull_request"* ]]; then
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [[ -n "$PR_NUMBER" ]]; then
            PR_LABELS=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels --jq '.labels[].name' 2>/dev/null || true)
            if echo "$PR_LABELS" | grep -qx "$REVIEW_LABEL"; then
              echo "🏷️ PR has '$REVIEW_LABEL' label — requiring $REQUIRED_APPROVALS approval(s)"
            else
              REQUIRED_APPROVALS="0"
              echo "🏷️ PR does not have '$REVIEW_LABEL' label — no approvals required"
            fi
          fi
        fi

        echo "required-approvals=$REQUIRED_APPROVALS" >> $GITHUB_OUTPUT

    - name: 🔧 Fix Dependabot commit prefix
      if: inputs.fix-dependabot-prefix == 'true' && github.event.pull_request.user.login == 'dependabot[bot]'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.auth.outputs.token }}
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        PR_TITLE="${{ github.event.pull_request.title }}"

        if [[ "$PR_TITLE" == chore\(deps\):* ]]; then
          NEW_TITLE="${PR_TITLE/chore(deps):/fix(deps):}"
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --title "$NEW_TITLE"
          echo "🔧 Rewrote PR title: $PR_TITLE → $NEW_TITLE"
        elif [[ "$PR_TITLE" == chore\(deps-dev\):* ]]; then
          NEW_TITLE="${PR_TITLE/chore(deps-dev):/fix(deps-dev):}"
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --title "$NEW_TITLE"
          echo "🔧 Rewrote PR title: $PR_TITLE → $NEW_TITLE"
        else
          echo "ℹ️ PR title does not start with chore(deps): — no rewrite needed"
        fi

    - name: 🤖 Run automerge
      id: automerge
      uses: pascalgn/automerge-action@v0.16.4
      env:
        GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        # Merge configuration
        MERGE_LABELS: "${{ inputs.merge-labels }},${{ steps.format-labels.outputs.blocking-labels }}"
        MERGE_METHOD: ${{ inputs.merge-method }}
        # Use only PR title for squash commit message (not description)
        # This prevents body-max-line-length failures from long release notes
        MERGE_COMMIT_MESSAGE: "pull-request-title"
        MERGE_DELETE_BRANCH: ${{ inputs.delete-branch }}
        MERGE_RETRIES: "6"
        MERGE_RETRY_SLEEP: "10000"
        MERGE_REQUIRED_APPROVALS: ${{ steps.format-labels.outputs.required-approvals }}
        MERGE_ERROR_FAIL: "false"
        # Update configuration
        UPDATE_LABELS: ${{ inputs.merge-labels }}
        UPDATE_METHOD: ${{ inputs.update-method }}

    - name: 📝 Generate summary
      if: always()
      shell: bash
      run: |
        RESULT="${{ steps.automerge.outputs.mergeResult }}"
        PR_NUMBER="${{ steps.automerge.outputs.pullRequestNumber }}"

        cat >> $GITHUB_STEP_SUMMARY << EOF
        ## 🤖 Auto-Merge Summary

        | Property | Value |
        |:---------|:------|
        | 📌 Result | \`${RESULT:-N/A}\` |
        | 🔢 PR Number | ${PR_NUMBER:-N/A} |

        ---

        EOF

        case "$RESULT" in
          "merged")
            cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        > [!TIP]
        > ### ✅ Pull Request Merged
        > The pull request was successfully merged.

        EOF
            ;;
          "not_ready")
            cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        > [!NOTE]
        > ### ⏳ Not Ready Yet
        > Waiting for approvals or status checks.

        EOF
            ;;
          *)
            cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        > [!NOTE]
        > ### ℹ️ No Action Taken
        > No merge action was performed.

        EOF
            ;;
        esac
